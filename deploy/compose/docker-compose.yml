# HU-WeatherSim — the full local stack (Phase 2).
#
# Two layers, switched by a compose PROFILE:
#   default            infrastructure only: Kafka, Redis, TimescaleDB, Kafka UI
#   --profile app      + all six Go services, built from this repo
#
# The default stays infra-only ON PURPOSE: the day-to-day dev loop is still
# `make up` for infra + `go run` on the host (fast rebuilds, live logs, a
# debugger). The dual Kafka listeners below exist precisely so both worlds
# work at once — host processes use localhost:9092, containers use kafka:29092.
#
# Usage:
#   make up        # infra only (docker compose up -d)
#   make up-all    # everything (docker compose --profile app up -d --build)
#   make logs      # follow all logs
#   make down-all  # stop everything

name: huweathersim

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: huws-kafka
    ports:
      - "9092:9092" # host access: your `go run` producer/consumer use localhost:9092
    environment:
      # --- KRaft (no ZooKeeper): this one node is both broker AND controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      # --- Listeners: the tricky bit, explained ---
      # We define TWO client listeners because clients reach Kafka from two places:
      #   HOST   -> from your machine (go run):        localhost:9092
      #   DOCKER -> from other containers (Phase 2+):  kafka:29092
      # Kafka tells a client which address to use via ADVERTISED_LISTENERS, so each
      # side gets an address that actually resolves from where it lives.
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,DOCKER://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: HOST:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER

      # --- Single-node replication settings (a 1-node cluster can't replicate) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto-creation is OFF: an auto-created topic gets the broker default of
      # ONE partition, silently capping consumer parallelism. Since Phase 1,
      # every service creates its topics explicitly via kafkax.EnsureTopic with
      # a deliberate partition count — so a topic appearing "by accident" here
      # could only ever be a misconfiguration, and should fail loudly instead.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Where Kafka actually stores its log segments (the messages themselves)
      # AND, in KRaft mode, the cluster metadata.
      #
      # This MUST be set. Without it the apache/kafka image defaults to
      # /tmp/kafka-logs, so the volume mounted below would sit empty while the
      # real data lived in the container's writable layer — silently discarded
      # on `docker compose down`.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      # Bind-mounted into the repo (git-ignored) instead of a named Docker
      # volume, so the data is visible with `ls` and easy to inspect or wipe.
      #
      # The `:Z` suffix matters on SELinux systems like Fedora: it relabels the
      # directory with a container-private SELinux context. Without it the
      # container is denied write access and Kafka fails to start.
      - ./data/kafka:/var/lib/kafka/data:Z
    healthcheck:
      # The image ships the CLI tools; listing topics proves the broker is ready.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: huws-kafka-ui
    ports:
      - "8081:8080" # open http://localhost:8081 to browse topics & messages
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092 # uses the internal DOCKER listener
    depends_on:
      kafka:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: huws-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: huws-timescale
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # The six Go services (profile: app). Common traits, explained once:
  #
  #   build.context: ../..    the REPO ROOT — each service's go.mod resolves
  #                           the shared module via `replace ../../pkg`, and
  #                           Docker can only COPY what's inside the context.
  #   restart: unless-stopped this is what makes the ingestion-consumer's
  #                           crash-on-DB-error design self-healing: exit →
  #                           restart → Kafka redelivers → ON CONFLICT dedupes.
  #   depends_on+healthy      start order only. Services ALSO fail fast at
  #                           boot (PING / EnsureTopic) — belt and braces,
  #                           because on Kubernetes there is no depends_on.
  #   KAFKA_BROKERS etc.      container-side addresses (kafka:29092, not
  #                           localhost) — see the listener comment above.
  # ---------------------------------------------------------------------------

  sensor-gateway:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/sensor-gateway/Dockerfile }
    container_name: huws-sensor-gateway
    ports:
      - "8080:8080" # the REST API the frontend (and curl) talks to
    environment:
      REDIS_ADDR: redis:6379
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Alpine's busybox ships wget; -q -O- prints the body or fails loudly.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sensor-simulator:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/sensor-simulator/Dockerfile }
    container_name: huws-sensor-simulator
    # No ports: nothing talks TO the simulator — it only reads the registry
    # and produces to Kafka.
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_ADDR: redis:6379
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion-consumer:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/ingestion-consumer/Dockerfile }
    container_name: huws-ingestion-consumer
    environment:
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgres://weather:weather@timescaledb:5432/weather
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  aggregation-service:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/aggregation-service/Dockerfile }
    container_name: huws-aggregation
    environment:
      KAFKA_BROKERS: kafka:29092
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  notification-gateway:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/notification-gateway/Dockerfile }
    container_name: huws-notification-gateway
    ports:
      - "8082:8082" # WebSocket endpoint (/ws) for browsers and websocat
    environment:
      KAFKA_BROKERS: kafka:29092
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemetry-api:
    profiles: ["app"]
    build: { context: ../.., dockerfile: services/telemetry-api/Dockerfile }
    container_name: huws-telemetry-api
    ports:
      - "8083:8083" # stub until Phase 5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # Kafka now bind-mounts to ./data/kafka (see the kafka service above) rather
  # than using a named volume, so no kafka-data entry is needed here.
  redis-data:
  timescale-data:
